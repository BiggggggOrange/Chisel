<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#111111">
<title>Chisel Construction</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bk:#111;--dg:#2c2c2c;--mg:#888;--lg:#d8d8d8;--bg:#f4f4f4;--wh:#fff;
  --inp:#fffbe6;--cal:#eaf4ff;--grn:#e6f4ea;
  --accent:#111;--rad:10px;--safe:env(safe-area-inset-bottom,0px)
}
body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif;
  background:var(--bg);color:var(--bk);font-size:15px;min-height:100vh}

/* ── NAV ── */
#nav{position:sticky;top:0;z-index:100;background:var(--bk);
  display:flex;align-items:center;gap:0;height:52px;padding:0 4px}
#nav-logo{height:28px;margin:0 8px 0 6px;display:block}
#nav-title{color:#fff;font-size:13px;font-weight:600;letter-spacing:.5px;flex:1}
#nav-btn{background:none;border:1px solid rgba(255,255,255,.3);color:#fff;
  padding:5px 12px;border-radius:6px;font-size:12px;cursor:pointer}

/* ── SCREENS ── */
.screen{display:none;min-height:calc(100vh - 52px);padding-bottom:calc(80px + var(--safe))}
.screen.active{display:block}

/* ── HOME / PROJECT LIST ── */
#home{padding:0}
.home-banner{background:var(--dg);padding:20px 16px 16px;color:#fff}
.home-banner h1{font-size:20px;font-weight:600;margin-bottom:4px}
.home-banner p{font-size:13px;color:#aaa}
.proj-list{padding:12px}
.proj-card{background:var(--wh);border-radius:var(--rad);border:1px solid var(--lg);
  padding:14px 16px;margin-bottom:10px;cursor:pointer;
  display:flex;align-items:center;justify-content:space-between}
.proj-card:active{background:#f0f0f0}
.proj-card-left h3{font-size:15px;font-weight:600;margin-bottom:3px}
.proj-card-left p{font-size:12px;color:var(--mg)}
.proj-card-right{font-size:11px;color:var(--mg);text-align:right}
.proj-badge{display:inline-block;background:var(--bk);color:#fff;
  font-size:10px;padding:2px 7px;border-radius:4px;margin-bottom:4px}
.fab{position:fixed;bottom:calc(20px + var(--safe));right:20px;
  width:54px;height:54px;border-radius:50%;background:var(--bk);
  color:#fff;font-size:26px;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 3px 12px rgba(0,0,0,.3);z-index:50}

/* ── PROJECT HUB ── */
#hub{padding:0}
.hub-header{background:var(--bk);padding:16px;color:#fff}
.hub-header h2{font-size:17px;font-weight:600}
.hub-header p{font-size:12px;color:#aaa;margin-top:3px}
.hub-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:12px}
.doc-tile{background:var(--wh);border-radius:var(--rad);border:1px solid var(--lg);
  padding:14px 12px;cursor:pointer;position:relative}
.doc-tile:active{background:#f0f0f0}
.doc-tile-num{font-size:10px;color:var(--mg);margin-bottom:4px}
.doc-tile-name{font-size:13px;font-weight:600;line-height:1.3;margin-bottom:6px}
.doc-tile-sub{font-size:11px;color:var(--mg);line-height:1.4}
.doc-tile-done{position:absolute;top:10px;right:10px;
  width:8px;height:8px;border-radius:50%;background:var(--lg)}
.doc-tile-done.filled{background:#4caf50}
.doc-tile.locked{opacity:.45;pointer-events:none}
.doc-tile.locked::after{content:'🔒';position:absolute;top:8px;right:10px;font-size:14px}
.hub-back{display:flex;align-items:center;gap:6px;padding:12px 16px 0;cursor:pointer;
  font-size:13px;color:var(--mg)}

/* ── FORM SCREEN ── */
#form-screen{padding:0}
.form-header{background:var(--dg);padding:14px 16px;color:#fff;
  display:flex;align-items:center;gap:10px}
.form-header h3{font-size:15px;font-weight:600;flex:1}
.form-header p{font-size:11px;color:#aaa;margin-top:2px}
.form-body{padding:12px}
.section-card{background:var(--wh);border-radius:var(--rad);
  border:1px solid var(--lg);margin-bottom:12px;overflow:hidden}
.section-head{background:var(--bk);padding:10px 14px;
  font-size:12px;font-weight:600;color:#fff;letter-spacing:.3px}
.field-row{padding:10px 14px;border-bottom:1px solid #f0f0f0}
.field-row:last-child{border-bottom:none}
.field-label{font-size:11px;color:var(--mg);margin-bottom:5px;font-weight:500;text-transform:uppercase;letter-spacing:.3px}
.field-row input,.field-row select,.field-row textarea{
  width:100%;background:var(--inp);border:1px solid var(--lg);
  border-radius:6px;padding:9px 11px;font-size:14px;
  font-family:inherit;color:var(--bk);-webkit-appearance:none}
.field-row input:focus,.field-row select:focus,.field-row textarea:focus{
  outline:none;border-color:#888;background:#fffef0}
.field-row textarea{resize:vertical;min-height:80px}
.field-row.calc input{background:var(--cal);color:#1a5276}
.field-row.readonly input{background:#f8f8f8;color:var(--mg)}
.field-hint{font-size:11px;color:var(--mg);margin-top:4px}

/* repeating rows (line items) */
.line-items{padding:0}
.line-item{padding:10px 14px;border-bottom:1px solid #f0f0f0;background:var(--wh)}
.line-item:nth-child(even){background:#fafafa}
.line-item-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.line-item-num{font-size:11px;font-weight:700;color:var(--mg)}
.line-item-del{background:none;border:none;color:#d33;font-size:18px;
  cursor:pointer;padding:0 4px;line-height:1}
.line-item-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.line-item-grid .fg{display:flex;flex-direction:column;gap:3px}
.line-item-grid .fg label{font-size:10px;color:var(--mg);font-weight:500}
.line-item-grid .fg input,.line-item-grid .fg select{
  background:var(--inp);border:1px solid var(--lg);border-radius:5px;
  padding:7px 9px;font-size:13px;width:100%;font-family:inherit}
.line-item-grid .fg.calc input{background:var(--cal);color:#1a5276}
.add-line-btn{display:flex;align-items:center;justify-content:center;gap:6px;
  width:calc(100% - 28px);margin:10px 14px;padding:10px;
  background:none;border:1.5px dashed var(--lg);border-radius:8px;
  color:var(--mg);font-size:13px;cursor:pointer}
.add-line-btn:active{background:#f5f5f5}

/* checkbox options */
.check-group{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
.check-opt{display:flex;align-items:center;gap:5px;cursor:pointer;
  background:#f5f5f5;border:1px solid var(--lg);border-radius:5px;padding:5px 10px}
.check-opt input{width:14px;height:14px;accent-color:var(--bk)}
.check-opt span{font-size:12px}
.check-opt.selected{background:var(--bk);border-color:var(--bk)}
.check-opt.selected span{color:#fff}
.check-opt.selected input{accent-color:#fff}

/* status pills */
.status-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
.status-pill{padding:5px 12px;border-radius:20px;font-size:12px;
  border:1px solid var(--lg);cursor:pointer;background:#fff}
.status-pill.active{background:var(--bk);color:#fff;border-color:var(--bk)}

/* ── BOTTOM ACTION BAR ── */
.form-actions{position:fixed;bottom:0;left:0;right:0;z-index:99;
  background:var(--wh);border-top:1px solid var(--lg);
  padding:10px 12px calc(10px + var(--safe));
  display:flex;gap:8px}
.btn{flex:1;padding:12px 8px;border-radius:8px;font-size:14px;
  font-weight:600;cursor:pointer;border:none;font-family:inherit}
.btn-save{background:var(--bk);color:#fff}
.btn-save:active{background:#333}
.btn-export{background:#f0f0f0;color:var(--bk)}
.btn-export:active{background:#e0e0e0}
.btn-back{background:#f0f0f0;color:var(--bk)}

/* ── TOAST ── */
#toast{position:fixed;bottom:calc(90px + var(--safe));left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--bk);color:#fff;padding:9px 20px;border-radius:20px;
  font-size:13px;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;z-index:999}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;
  display:flex;align-items:flex-end;justify-content:center}
.modal-overlay.hidden{display:none}
.modal-box{background:var(--wh);border-radius:16px 16px 0 0;width:100%;
  max-width:500px;padding:20px 16px calc(20px + var(--safe));max-height:80vh;overflow-y:auto}
.modal-title{font-size:16px;font-weight:700;margin-bottom:16px}
.modal-btn{width:100%;padding:13px;border-radius:8px;font-size:14px;
  font-weight:600;cursor:pointer;border:none;margin-bottom:8px;font-family:inherit}
.modal-btn-primary{background:var(--bk);color:#fff}
.modal-btn-secondary{background:#f0f0f0;color:var(--bk)}
.modal-btn-danger{background:#d33;color:#fff}
.modal-input{width:100%;background:var(--inp);border:1px solid var(--lg);
  border-radius:8px;padding:11px 13px;font-size:15px;font-family:inherit;margin-bottom:10px}

/* summary / totals */
.total-row{display:flex;justify-content:space-between;align-items:center;
  padding:10px 14px;border-bottom:1px solid #f0f0f0}
.total-row.highlight{background:var(--bk);color:#fff}
.total-row.highlight span{color:#fff}
.total-label{font-size:13px}
.total-value{font-size:14px;font-weight:600;color:#1a5276}
.total-row.highlight .total-value{color:#fff}

/* signature pad */
#sig-canvas{width:100%;height:120px;background:var(--inp);
  border:1px solid var(--lg);border-radius:8px;touch-action:none}
.sig-controls{display:flex;gap:8px;margin-top:6px}
.sig-btn{flex:1;padding:8px;background:#f0f0f0;border:none;border-radius:6px;
  font-size:12px;cursor:pointer}
</style>
</head>

<script>
// ══════════════════════════════
// STATE
// ══════════════════════════════
let projects = JSON.parse(localStorage.getItem('cc_projects')||'[]');
let currentProjId = null;
let currentDocId   = null;

function save(){localStorage.setItem('cc_projects',JSON.stringify(projects))}

function getProj(){return projects.find(p=>p.id===currentProjId)}

function getDoc(){
  const p=getProj();
  if(!p)return null;
  if(!p.docs)p.docs={};
  if(!p.docs[currentDocId])p.docs[currentDocId]={};
  return p.docs[currentDocId];
}

// ── Project numbering ──
function genProjNum(){
  const letters='ABCDEFGHJKLMNPQRSTUVWXYZ';
  const L=letters[Math.floor(Math.random()*letters.length)];
  const N=String(Math.floor(10000+Math.random()*89999));
  return L+N;
}

// ══════════════════════════════
// SCREENS
// ══════════════════════════════
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

function goHome(){showScreen('home');renderProjectList()}
function closeModal(id){document.getElementById(id).classList.add('hidden')}

// ══════════════════════════════
// HOME
// ══════════════════════════════
function renderProjectList(){
  const el=document.getElementById('proj-list');
  if(!projects.length){
    el.innerHTML='<div style="text-align:center;padding:48px 20px;color:var(--mg)">'
      +'<div style="font-size:36px;margin-bottom:12px">📋</div>'
      +'<div style="font-size:15px;margin-bottom:6px">暂无项目</div>'
      +'<div style="font-size:13px">点击右下角 + 新建第一个项目</div></div>';
    return;
  }
  el.innerHTML=projects.map(p=>{
    const filled=Object.keys(p.docs||{}).length;
    const d=p.createdAt?new Date(p.createdAt).toLocaleDateString('zh-CN'):'';
    return `<div class="proj-card" onclick="openProject('${p.id}')">
      <div class="proj-card-left">
        <h3>${p.address||'未命名项目'}</h3>
        <p>${p.client||''} &nbsp;·&nbsp; ${d}</p>
      </div>
      <div class="proj-card-right">
        <div class="proj-badge">${p.num}</div>
        <div>${filled}/10 已填</div>
      </div>
    </div>`;
  }).join('');
}

function showNewProjectModal(){
  document.getElementById('new-proj-addr').value='';
  document.getElementById('new-proj-client').value='';
  document.getElementById('new-proj-modal').classList.remove('hidden');
  setTimeout(()=>document.getElementById('new-proj-addr').focus(),100);
}

function createProject(){
  const addr=document.getElementById('new-proj-addr').value.trim();
  const client=document.getElementById('new-proj-client').value.trim();
  if(!addr){toast('请填写项目地址');return}
  const num=genProjNum();
  const p={id:Date.now().toString(),num,address:addr,client,
    createdAt:new Date().toISOString(),docs:{}};
  projects.unshift(p);save();
  closeModal('new-proj-modal');
  openProject(p.id);
}

// ══════════════════════════════
// PROJECT HUB
// ══════════════════════════════
const DOC_META=[
  {id:'001',name:'项目资料统合表',sub:'看完现场立即填'},
  {id:'002',name:'报价工作底稿',sub:'内部用 · 成本+利润分析',internal:true},
  {id:'003',name:'Proposal 报价清单',sub:'对外 · 中英双语',requires:'002'},
  {id:'004',name:'施工合同',sub:'报价确认后签署',requires:'003'},
  {id:'005',name:'财务跟进表',sub:'付款节点 · 成本预估',requires:'004'},
  {id:'006',name:'项目进度跟进单',sub:'工序甘特 · 检查点',requires:'004'},
  {id:'007',name:'材料采购跟进单',sub:'采购清单 · 到货跟进'},
  {id:'008',name:'外包管理记录',sub:'合同 · 质检 · 付款'},
  {id:'009',name:'竣工验收单',sub:'逐项验收 · 客户签字',requires:'004'},
  {id:'010',name:'项目复盘总结',sub:'财务复盘 · 经验沉淀',requires:'009'},
];

function openProject(id){
  currentProjId=id;
  const p=getProj();
  document.getElementById('hub-title').textContent=p.address;
  document.getElementById('hub-sub').textContent=p.num+(p.client?' · '+p.client:'');
  const grid=document.getElementById('hub-grid');
  grid.innerHTML=DOC_META.map(d=>{
    const filled=p.docs&&p.docs[d.id]&&Object.keys(p.docs[d.id]).length>0;
    const locked=d.requires&&!(p.docs&&p.docs[d.requires]&&Object.keys(p.docs[d.requires]).length>0);
    return `<div class="doc-tile${locked?' locked':''}" onclick="openDoc('${d.id}')">
      <div class="doc-tile-num">${d.id}</div>
      <div class="doc-tile-name">${d.name}</div>
      <div class="doc-tile-sub">${d.sub}</div>
      <div class="doc-tile-done${filled?' filled':''}"></div>
    </div>`;
  }).join('');
  showScreen('hub');
}

// ══════════════════════════════
// FORM ENGINE
// ══════════════════════════════
function openDoc(docId){
  currentDocId=docId;
  const meta=DOC_META.find(d=>d.id===docId);
  const p=getProj();
  document.getElementById('form-title').textContent=meta.name;
  document.getElementById('form-subtitle').textContent=p.num+' · '+meta.sub;
  document.getElementById('form-back-label').textContent='返回项目';
  document.getElementById('form-back-btn').onclick=()=>openProject(currentProjId);

  const doc=getDoc();
  const body=document.getElementById('form-body');
  body.innerHTML='';

  // Inherit shared fields from 001
  const base=p.docs&&p.docs['001']||{};
  const merged={...base,...doc};

  FORMS[docId](body,merged,p);
  showScreen('form-screen');
}

// ── save current form ──
function saveForm(){
  const doc=getDoc();
  const inputs=document.querySelectorAll('#form-body [data-key]');
  inputs.forEach(el=>{
    const k=el.dataset.key;
    const v=el.tagName==='INPUT'&&el.type==='checkbox'?el.checked:el.value;
    doc[k]=v;
  });
  save();
  // refresh dot on hub
  toast('已保存 ✓');
}

function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2000);
}

// ── helpers to build form fields ──
function section(title){
  const d=document.createElement('div');d.className='section-card';
  d.innerHTML=`<div class="section-head">${title}</div>`;
  return d;
}

function field(label,key,value='',type='text',hint='',opts={}){
  const row=document.createElement('div');
  row.className='field-row'+(opts.calc?' calc':opts.readonly?' readonly':'');
  let inp;
  if(type==='textarea'){
    inp=`<textarea data-key="${key}" rows="3">${value||''}</textarea>`;
  }else if(type==='select'){
    const os=opts.options||[];
    inp=`<select data-key="${key}">${os.map(o=>`<option value="${o}"${value===o?' selected':''}>${o}</option>`).join('')}</select>`;
  }else{
    inp=`<input type="${type}" data-key="${key}" value="${value||''}" placeholder="${opts.placeholder||''}"${opts.readonly?' readonly':''}>`;
  }
  row.innerHTML=`<div class="field-label">${label}</div>${inp}${hint?`<div class="field-hint">${hint}</div>`:''}`;
  return row;
}

function checkboxGroup(label,key,value='',options=[]){
  const saved=(value||'').split(',').filter(Boolean);
  const row=document.createElement('div');row.className='field-row';
  const opts=options.map(o=>`
    <label class="check-opt${saved.includes(o)?' selected':''}">
      <input type="checkbox" data-key="${key}" data-group="${key}" value="${o}"${saved.includes(o)?' checked':''}>
      <span>${o}</span>
    </label>`).join('');
  row.innerHTML=`<div class="field-label">${label}</div><div class="check-group">${opts}</div>`;
  // click handler
  row.querySelectorAll('input[type=checkbox]').forEach(cb=>{
    cb.addEventListener('change',()=>{
      row.querySelectorAll('label.check-opt').forEach(l=>{
        l.classList.toggle('selected',l.querySelector('input').checked);
      });
    });
  });
  return row;
}

function statusRow(label,key,value='',options=[]){
  const row=document.createElement('div');row.className='field-row';
  const pills=options.map(o=>
    `<div class="status-pill${value===o?' active':''}" onclick="this.parentNode.querySelectorAll('.status-pill').forEach(p=>p.classList.remove('active'));this.classList.add('active');this.closest('[data-container]').querySelector('[data-key=\\'${key}\\']').value='${o}'">${o}</div>`
  ).join('');
  row.innerHTML=`<div class="field-label">${label}</div>
    <div class="status-row" data-container>
      <input type="hidden" data-key="${key}" value="${value||''}">
      ${pills}
    </div>`;
  return row;
}

function lineItemsSection(title,key,data,cols){
  const card=section(title);
  const wrap=document.createElement('div');wrap.className='line-items';wrap.id=`li_${key}`;
  const items=data||[{}];
  items.forEach((item,i)=>wrap.appendChild(makeLineItem(key,item,i,cols)));
  const addBtn=document.createElement('button');addBtn.className='add-line-btn';
  addBtn.innerHTML='＋ 添加一行';
  addBtn.onclick=()=>{
    const all=wrap.querySelectorAll('.line-item').length;
    const newItem={};cols.forEach(c=>{newItem[c.key]='';});
    wrap.insertBefore(makeLineItem(key,newItem,all,cols),addBtn);
  };
  card.appendChild(wrap);card.appendChild(addBtn);
  return card;
}

function makeLineItem(key,data,idx,cols){
  const item=document.createElement('div');item.className='line-item';
  const grid=cols.map(c=>`
    <div class="fg${c.calc?' calc':''}">
      <label>${c.label}</label>
      <input type="${c.type||'text'}" data-key="${key}[${idx}][${c.key}]"
        value="${data[c.key]||''}" placeholder="${c.ph||''}"${c.calc?' readonly':''}>
    </div>`).join('');
  item.innerHTML=`<div class="line-item-head">
    <span class="line-item-num">行 ${idx+1}</span>
    <button class="line-item-del" onclick="this.closest('.line-item').remove()">×</button>
  </div><div class="line-item-grid">${grid}</div>`;
  // auto-calc if cols have calc
  const calcCols=cols.filter(c=>c.calc);
  if(calcCols.length){
    item.querySelectorAll('input').forEach(inp=>{
      inp.addEventListener('input',()=>recalcLine(item,cols));
    });
  }
  return item;
}

function recalcLine(item,cols){
  const vals={};
  cols.forEach(c=>{if(!c.calc){const el=item.querySelector(`input[data-key*="[${c.key}]"]`);if(el)vals[c.key]=parseFloat(el.value)||0;}});
  cols.filter(c=>c.calc).forEach(c=>{
    const el=item.querySelector(`input[data-key*="[${c.key}]"]`);
    if(el&&c.formula)el.value=c.formula(vals);
  });
}

function totalsCard(rows){
  const card=document.createElement('div');card.className='section-card';
  rows.forEach(([label,key,hi])=>{
    const row=document.createElement('div');
    row.className='total-row'+(hi?' highlight':'');
    row.innerHTML=`<span class="total-label">${label}</span>
      <span class="total-value"><input type="text" data-key="${key}" 
        style="background:none;border:none;outline:none;text-align:right;width:120px;
        font-size:14px;font-weight:600;color:${hi?'#fff':'#1a5276'};font-family:inherit"
        placeholder="$0.00"></span>`;
    card.appendChild(row);
  });
  return card;
}

function exportExcel(){
  saveForm();
  const doc=getDoc();const p=getProj();const meta=DOC_META.find(d=>d.id===currentDocId);
  const wb=XLSX.utils.book_new();
  const flat=[];
  flat.push(['Chisel Construction Inc. | 齐造营建']);
  flat.push([meta.name, '', p.num]);
  flat.push([]);
  Object.entries(doc).forEach(([k,v])=>{
    if(typeof v==='string'||typeof v==='number'){
      flat.push([k.replace(/_/g,' '), '', v]);
    }else if(Array.isArray(v)){
      flat.push([k.replace(/_/g,' ')]);
      v.forEach((row,i)=>{
        if(i===0) flat.push(Object.keys(row).map(k2=>k2.replace(/_/g,' ')));
        flat.push(Object.values(row));
      });
      flat.push([]);
    }
  });
  const ws=XLSX.utils.aoa_to_sheet(flat);
  ws['!cols']=[{wch:30},{wch:5},{wch:40}];
  XLSX.utils.book_append_sheet(wb,ws,meta.id);
  XLSX.writeFile(wb,`${p.num}-${currentDocId}_${meta.name}.xlsx`);
  closeModal('export-modal');
  toast('Excel 已下载 ✓');
}

function exportPrint(){
  saveForm();
  closeModal('export-modal');
  setTimeout(()=>window.print(),200);
}
